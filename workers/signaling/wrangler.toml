name = "main-signal"
main = "src/index.ts"
compatibility_date = "2024-10-01"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RoomDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]

# Cron trigger: 3:00 AM IST daily = 21:30 UTC (IST is UTC+5:30)
# Clears SQLite Durable Object storage for a fresh start every day
[triggers]
crons = ["30 21 * * *"]
