<!DOCTYPE html>
<html>
<head>
  <title>CosmoShare Logo Preview</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
      gap: 40px;
    }
    .preview {
      text-align: center;
    }
    .preview img {
      display: block;
      margin: 0 auto 10px;
    }
    h3 { font-family: sans-serif; color: #333; }
  </style>
</head>
<body>
  <div class="preview">
    <img src="logo.svg" width="300" height="300" alt="CosmoShare Logo">
    <h3>300×300</h3>
  </div>
  <div class="preview">
    <img src="logo.svg" width="150" height="150" alt="CosmoShare Logo">
    <h3>150×150</h3>
  </div>
  <div class="preview">
    <img src="logo.svg" width="64" height="64" alt="CosmoShare Logo">
    <h3>64×64</h3>
  </div>
</body>
</html>
